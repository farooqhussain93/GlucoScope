{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>GlucoScope Dashboard</title>
  <link rel="stylesheet" href="{% static 'predictor/style.css' %}" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet" />
  <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>
  <div class="dashboard-container">


    <header class="header">
  <h2 class="logo">🧬 GlucoScope</h2>
</header>

    <!-- Main content -->
    <main class="main-content">
        <div class="form-wrapper">
      <header>
        <h1>Diabetes Risk Prediction</h1>
        <p>Fill in the details below to predict diabetes using ML</p>
      </header>

      <form method="POST" action="/predict/" class="form-grid">
        {% csrf_token %}

        <div class="form-group">
          <label><i data-lucide="user"></i> Pregnancies</label>
          <input type="number" name="Pregnancies" placeholder="Number of Pregnancies" required />
        </div>

        <div class="form-group">
          <label><i data-lucide="activity"></i> Glucose</label>
          <input type="number" name="Glucose" placeholder="Glucose Level" required />
        </div>

        <div class="form-group">
          <label><i data-lucide="thermometer"></i> Blood Pressure</label>
          <input type="number" name="BloodPressure" placeholder="Blood Pressure" required />
        </div>

        <div class="form-group">
          <label><i data-lucide="ruler"></i> Skin Thickness</label>
          <input type="number" name="SkinThickness" placeholder="Skin Thickness" required />
        </div>

        <div class="form-group">
          <label><i data-lucide="droplets"></i> Insulin</label>
          <input type="number" name="Insulin" placeholder="Insulin Level" required />
        </div>

        <div class="form-group">
          <label><i data-lucide="bar-chart"></i> BMI</label>
          <input type="number" step="any" name="BMI" placeholder="Body Mass Index" required />
        </div>

        <div class="form-group">
          <label><i data-lucide="dna"></i> Pedigree Function</label>
          <input type="number" step="any" name="DiabetesPedigreeFunction" placeholder="Diabetes Pedigree Function" required />
        </div>

        <div class="form-group">
          <label><i data-lucide="calendar"></i> Age</label>
          <input type="number" name="Age" placeholder="Age in years" required />
        </div>

        <div class="form-group full-width">
          <button type="submit" class="glow-button">
            <i data-lucide="brain-circuit"></i> Predict Diabetes
          </button>
        </div>
      </form>
      </div>
    </main>
  </div>

  <script>
    lucide.createIcons();
  </script>
</body>
</html>
